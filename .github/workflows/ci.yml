name: CI

on:
  workflow_dispatch:
    inputs:
      package_path:
        description: 'Path to package directory'
        required: true
        default: 'Part 1 - Variables, Conditions, Loops'
      run_ty:
        description: 'Run ty type checker'
        required: false
        default: false
        type: boolean
      run_pyrefly:
        description: 'Run pyrefly type checker'
        required: false
        default: false
        type: boolean
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group lint --group test

      - name: Run ruff check
        run: uv run ruff check ${{ github.event.inputs.package_path || 'Part 1 - Variables, Conditions, Loops' }}

      - name: Run wemake-python-styleguide
        run: uv run flake8 ${{ github.event.inputs.package_path || 'Part 1 - Variables, Conditions, Loops' }}

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group lint --group test

      - name: Run mypy
        run: uv run mypy ${{ github.event.inputs.package_path || 'Part 1 - Variables, Conditions, Loops' }}

      - name: Run ty (optional)
        if: ${{ github.event.inputs.run_ty == 'true' }}
        run: uv run ty check ${{ github.event.inputs.package_path || 'Part 1 - Variables, Conditions, Loops' }}

      - name: Run pyrefly (optional)
        if: ${{ github.event.inputs.run_pyrefly == 'true' }}
        run: uv run pyrefly check ${{ github.event.inputs.package_path || 'Part 1 - Variables, Conditions, Loops' }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group lint --group test

      - name: Run pytest
        run: uv run pytest ${{ github.event.inputs.package_path || 'Part 1 - Variables, Conditions, Loops' }}/tests -v
